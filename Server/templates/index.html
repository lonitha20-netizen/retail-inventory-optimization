<!DOCTYPE html>
<html>
<head>
    <title>Retail Inventory Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px #ccc; max-width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sales Predictor</h2>
        <form action="/predict" method="post">
            <input type="number" name="Store" placeholder="Store ID (1-45)" required>
            <input type="number" name="Dept" placeholder="Dept ID" required>
            <input type="number" name="Size" placeholder="Store Size" required>
            <select name="Type">
                <option value="1">Type A</option>
                <option value="2">Type B</option>
                <option value="3">Type C</option>
            </select>
            <input type="number" name="Month" placeholder="Month (1-12)" required>
            <button type="submit">Predict Sales</button>
        </form>
        {% if prediction %}
        <h3>Predicted Weekly Sales: <span style="color:green">${{ prediction }}</span></h3>
        {% endif %}
    </div>
</body>
</html>
